# ─────────────────────────────────────────────────────────────────────────────
# Miscellaneous Deployments — Overseerr (seerr) and Tautulli
# ─────────────────────────────────────────────────────────────────────────────

# ── Seerr (Overseerr/Jellyseerr successor) ──────────────────────────────────
# The native seerr image is rootless (runs as node, 1000:1000) and stores its
# data at /app/config, not /config. It ignores PUID/PGID; the pod securityContext
# sets the user instead. The seerr-config PVC keeps its files at the volume root,
# so remounting it at /app/config surfaces the existing Overseerr settings and
# database, which seerr auto-migrates on first start. (seerr-config is included
# in the nightly backup, so this migration is recoverable.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: {{ .Release.Namespace }}
  labels:
    app: seerr
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: seerr
          image: {{ .Values.seerr.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.seerr.port }}
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: media-env
                  key: TZ
            - name: PORT
              value: {{ .Values.seerr.port | quote }}
          resources:
            {{- toYaml .Values.seerr.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /api/v1/status
              port: {{ .Values.seerr.port }}
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/status
              port: {{ .Values.seerr.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: {{ .Values.seerr.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            # Native seerr stores data at /app/config. The PVC's files live at
            # its root, so the existing Overseerr config surfaces here and seerr
            # migrates it on first boot.
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config

---
# ── Tautulli ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tautulli
  namespace: {{ .Release.Namespace }}
  labels:
    app: tautulli
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tautulli
  template:
    metadata:
      labels:
        app: tautulli
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      automountServiceAccountToken: false
      {{- include "akpn.podSecurityContext" . | nindent 6 }}
      containers:
        - name: tautulli
          image: {{ .Values.tautulli.image }}
          imagePullPolicy: IfNotPresent
          {{- include "akpn.lsioContainerSecurity" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.tautulli.port }}
          env:
            {{- include "akpn.globalEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.tautulli.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /status
              port: {{ .Values.tautulli.port }}
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: {{ .Values.tautulli.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status
              port: {{ .Values.tautulli.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tautulli-config
