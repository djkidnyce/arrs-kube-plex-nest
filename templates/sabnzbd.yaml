# ─────────────────────────────────────────────────────────────────────────────
# SABnzbd Deployment — 3-container pod with VPN
#
# Two VPN modes (vpn.mode):
#   native  — gluetun picks servers from its built-in list for vpn.provider.
#             No .ovpn files, no init container. Recommended.
#   custom  — your own .ovpn files via `deploy.sh --ovpn-dir`. gluetun's
#             OPENVPN_CUSTOM_CONFIG takes ONE file, named by vpn.customConfigFile.
#
# Container layout (all share the same network namespace):
#   init: patch-ovpn-creds  — custom mode only: copies .ovpn files from the
#                              vpn-ovpn-configs Secret to emptyDir, rewrites
#                              auth-user-pass to /vpn/auth/openvpn.cred
#   1. gluetun              — VPN (NET_ADMIN), creates tun0, enforces kill-switch
#   2. sabnzbd              — download client; all traffic goes via gluetun
#   3. vpn-rotator          — calls gluetun control API (apikey auth) to cycle server
#
# .ovpn files are loaded at deploy time: ./deploy.sh --ovpn-dir /path/to/ovpns
# (they are stored only in the vpn-ovpn-configs Secret, never in the repo).
#
# Kill-switch: gluetun's iptables rules block ALL egress except
# FIREWALL_OUTBOUND_SUBNETS (RFC-1918, so the *arrs can reach SABnzbd's
# ClusterIP without going through the tunnel).
#
# gluetun >= v3.40 requires control-server auth: the config.toml with an
# apikey role is mounted from the gluetun-control-auth Secret (deploy.sh
# generates it).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: {{ .Release.Namespace }}
  labels:
    app: sabnzbd
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVCs — only one pod at a time
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      automountServiceAccountToken: false
      {{- include "akpn.podSecurityContext" . | nindent 6 }}

      {{- if eq .Values.vpn.mode "custom" }}
      # ── Init: patch .ovpn credential paths (custom mode only) ───────────
      initContainers:
        - name: patch-ovpn-creds
          image: {{ .Values.initImage }}
          imagePullPolicy: IfNotPresent
          {{- include "akpn.restrictedContainerSecurity" . | nindent 10 }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "[init] Copying and patching .ovpn files..."
              count=0
              for f in /source/*.ovpn; do
                [ -f "$f" ] || { echo "[init] No .ovpn files found — did you run deploy.sh --ovpn-dir?"; break; }
                base=$(basename "$f")
                sed 's|^auth-user-pass.*|auth-user-pass /vpn/auth/openvpn.cred|g' \
                    "$f" > "/patched/$base"
                echo "[init] Patched: $base"
                count=$((count + 1))
              done
              echo "[init] Done — $count file(s) patched."
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: vpn-configs
              mountPath: /source
              readOnly: true
            - name: patched-configs
              mountPath: /patched
      {{- end }}

      containers:
        # ── 1. gluetun VPN ────────────────────────────────────────────────
        - name: gluetun
          image: {{ .Values.vpn.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # Empirically the minimum gluetun needs (verified on a live
              # cluster): NET_ADMIN for tun0/iptables, CHOWN + DAC_OVERRIDE to
              # write /etc/openvpn/target.ovpn (dropping ALL removes even
              # root's implicit file powers), SETUID/SETGID so openvpn can drop
              # to nonrootuser. NET_RAW deliberately omitted: gluetun only
              # wants it for ICMP health checks and falls back to DNS probes.
              add: ["NET_ADMIN", "CHOWN", "DAC_OVERRIDE", "SETUID", "SETGID"]
          env:
            - name: VPN_TYPE
              value: "openvpn"
            {{- if eq .Values.vpn.mode "native" }}
            - name: VPN_SERVICE_PROVIDER
              value: {{ .Values.vpn.provider | quote }}
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: vpn-credentials
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vpn-credentials
                  key: OPENVPN_PASSWORD
            {{- with .Values.vpn.serverCountries }}
            - name: SERVER_COUNTRIES
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.vpn.serverCities }}
            - name: SERVER_CITIES
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.vpn.serverHostnames }}
            - name: SERVER_HOSTNAMES
              value: {{ . | quote }}
            {{- end }}
            {{- else }}
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            # OPENVPN_CUSTOM_CONFIG takes a SINGLE file, never a directory.
            - name: OPENVPN_CUSTOM_CONFIG
              value: "/gluetun/patched-configs/{{ required "vpn.customConfigFile is required when vpn.mode=custom" .Values.vpn.customConfigFile }}"
            # Auth comes from the credential file referenced by auth-user-pass
            # (rewritten by the init container). Do NOT set OPENVPN_USER /
            # OPENVPN_PASSWORD here — they would override the file.
            {{- end }}
            - name: FIREWALL_OUTBOUND_SUBNETS
              valueFrom:
                configMapKeyRef:
                  name: vpn-config
                  key: firewall-outbound-subnets
            # Gluetun's firewall drops NEW inbound connections on the pod
            # interface unless the port is whitelisted. Required so the *arrs
            # and kubelet probes can reach SABnzbd's API (gluetun wiki,
            # firewall.md — "needed for Kubernetes sidecars").
            - name: FIREWALL_INPUT_PORTS
              value: {{ .Values.sabnzbd.port | quote }}
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8000"
            - name: HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH
              value: "/gluetun/auth/config.toml"
          resources:
            {{- toYaml .Values.vpn.resources | nindent 12 }}
          volumeMounts:
            {{- if eq .Values.vpn.mode "custom" }}
            - name: patched-configs
              mountPath: /gluetun/patched-configs
              readOnly: true
            - name: vpn-cred-file
              mountPath: /vpn/auth
              readOnly: true
            {{- end }}
            - name: control-auth
              mountPath: /gluetun/auth
              readOnly: true
            - name: tun-device
              mountPath: /dev/net/tun

        # ── 2. SABnzbd ────────────────────────────────────────────────────
        - name: sabnzbd
          image: {{ .Values.sabnzbd.image }}
          imagePullPolicy: IfNotPresent
          {{- include "akpn.lsioContainerSecurity" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.sabnzbd.port }}
          env:
            {{- include "akpn.globalEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.sabnzbd.resources | nindent 12 }}
          # TCP probes, not HTTP: SABnzbd's /api returns 403 without an API
          # key and it exposes no unauthenticated health endpoint, so an HTTP
          # probe can never pass and the pod stays permanently unready.
          startupProbe:
            tcpSocket:
              port: {{ .Values.sabnzbd.port }}
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.sabnzbd.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: {{ .Values.sabnzbd.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: sabnzbd-config
              mountPath: /config
            - name: media
              mountPath: /mnt/media

        # ── 3. VPN Rotator ────────────────────────────────────────────────
        - name: vpn-rotator
          image: {{ .Values.vpnRotator.image }}
          imagePullPolicy: IfNotPresent
          {{- include "akpn.restrictedContainerSecurity" . | nindent 10 }}
          command:
            - /bin/sh
            - /scripts/rotate.sh
          env:
            - name: GLUETUN_APIKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vpn.controlAuthSecret }}
                  key: apikey
          resources:
            {{- toYaml .Values.vpnRotator.resources | nindent 12 }}
          volumeMounts:
            - name: vpn-rotation-interval
              mountPath: /etc/vpn-rotation
            - name: vpn-rotation-script
              mountPath: /scripts

      # ── Volumes ──────────────────────────────────────────────────────────
      volumes:
        - name: sabnzbd-config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        {{- if eq .Values.vpn.mode "custom" }}
        - name: vpn-configs
          secret:
            secretName: {{ .Values.vpn.ovpnSecret }}
            defaultMode: 0440
        - name: patched-configs
          emptyDir: {}
        - name: vpn-cred-file
          secret:
            secretName: vpn-credentials
            items:
              - key: openvpn.cred
                path: openvpn.cred
                mode: 0440
        {{- end }}
        - name: control-auth
          secret:
            secretName: {{ .Values.vpn.controlAuthSecret }}
            items:
              - key: config.toml
                path: config.toml
                mode: 0440
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: vpn-rotation-interval
          configMap:
            name: vpn-config
            items:
              - key: rotation-interval-seconds
                path: rotation-interval-seconds
        - name: vpn-rotation-script
          configMap:
            name: vpn-config
            items:
              - key: rotate.sh
                path: rotate.sh
                mode: 0555
