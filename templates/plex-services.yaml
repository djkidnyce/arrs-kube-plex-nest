# ─────────────────────────────────────────────────────────────────────────────
# Plex Services
#
# 1. Headless service — required by the StatefulSet for stable pod DNS.
# 2. Per-pod LoadBalancer services — one per replica, each pinned to a pod
#    via the statefulset.kubernetes.io/pod-name label.
#    External ports: plex-0 → basePort, plex-1 → basePort+1, ...
#
# NOTE: each Plex server advertises 32400 internally. For remote access on
# plex-1 and up, set the custom public port (basePort+N) in that server's
# Settings → Remote Access.
# ─────────────────────────────────────────────────────────────────────────────

# Headless service (StatefulSet DNS)
apiVersion: v1
kind: Service
metadata:
  name: plex-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: plex
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: plex
  ports:
    - name: plex
      port: 32400
      targetPort: 32400
      protocol: TCP

{{- $basePort := .Values.plex.basePort | int }}
{{- $ns := .Release.Namespace }}
{{- $labels := include "akpn.labels" . }}
{{- $root := . }}
{{- range $i := until (.Values.plex.replicas | int) }}
---
apiVersion: v1
kind: Service
metadata:
  name: plex-{{ $i }}
  namespace: {{ $ns }}
  labels:
    app: plex
    app.kubernetes.io/instance: plex-{{ $i }}
    {{- $labels | nindent 4 }}
  annotations:
    # Uncomment to pin a specific IP (e.g. on MetalLB):
    # metallb.universe.tf/loadBalancerIPs: "192.168.1.{{ add 200 $i }}"
spec:
  type: {{ include "akpn.serviceType" (dict "svc" "plex" "root" $root) }}
  # Route exclusively to this pod, not the whole StatefulSet
  selector:
    app: plex
    statefulset.kubernetes.io/pod-name: plex-{{ $i }}
  ports:
    - name: plex
      port: {{ add $basePort $i }}
      targetPort: 32400
      protocol: TCP
      {{- if and $root.Values.expose.plex (eq $root.Values.expose.mode "nodePort") }}
      nodePort: {{ add $basePort $i }}
      {{- end }}
{{- end }}
