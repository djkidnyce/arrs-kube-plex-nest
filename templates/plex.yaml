# ─────────────────────────────────────────────────────────────────────────────
# Plex StatefulSet — N INDEPENDENT Plex servers
#
# Plex cannot autoscale (SQLite config DB, no clustering, no session sharing),
# so there is no HPA. `plex.replicas` runs that many separate Plex servers:
#   plex-0 → plex-config-plex-0 → external port basePort
#   plex-1 → plex-config-plex-1 → external port basePort+1
# Each must be claimed and configured once; both mount the same media share.
# Replica count is fixed and only changes via `--set plex.replicas=N`.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plex
  namespace: {{ .Release.Namespace }}
  labels:
    app: plex
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  serviceName: plex-headless
  replicas: {{ .Values.plex.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      # Required when Windows nodes are present in the cluster.
      nodeSelector:
        kubernetes.io/os: linux
      automountServiceAccountToken: false
      {{- include "akpn.podSecurityContext" . | nindent 6 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: plex
          image: {{ .Values.plex.image }}
          imagePullPolicy: IfNotPresent
          {{- include "akpn.lsioContainerSecurity" . | nindent 10 }}
          ports:
            - containerPort: 32400
              protocol: TCP
          env:
            {{- include "akpn.globalEnv" . | nindent 12 }}
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: plex-claim
                  key: token
                  optional: true   # only used while a server is unclaimed
          resources:
            {{- toYaml .Values.plex.resources | nindent 12 }}
          # Plex can take minutes on first boot / after a library scan.
          startupProbe:
            httpGet:
              path: /identity
              port: 32400
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /identity
              port: 32400
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /identity
              port: 32400
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /mnt/media
            - name: transcode
              mountPath: /transcode
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        # Disk-backed scratch for transcodes — set Settings → Transcoder →
        # "Transcoder temporary directory" to /transcode on each server.
        - name: transcode
          emptyDir:
            sizeLimit: {{ .Values.plex.transcodeScratchSize }}
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.plex.configStorageSize }}
