# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: media-env — global environment shared by all LSIO containers
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: media-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
data:
  PUID: {{ .Values.global.puid | quote }}
  PGID: {{ .Values.global.pgid | quote }}
  TZ:   {{ .Values.global.timezone | quote }}

---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: vpn-config — VPN rotation script + tunable interval
#
# To change rotation frequency without restarting the pod:
#   kubectl edit configmap vpn-config -n <namespace>
#   Change rotation-interval-seconds (0 = disabled)
#   The vpn-rotator container re-reads the file on every loop iteration.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: vpn-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
data:
  rotation-interval-seconds: {{ .Values.vpn.rotationIntervalSeconds | quote }}
  firewall-outbound-subnets: {{ .Values.vpn.firewallOutboundSubnets | quote }}
  rotate.sh: |
{{ .Files.Get "files/scripts/rotate.sh" | indent 4 }}

{{- if .Values.clamav.enabled }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: clamav-config — scan script + tunable parameters
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clamav-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
data:
  NOTIFICATION_TYPE: {{ .Values.clamav.notificationType | quote }}
  NOTIFY_ON_CLEAN:   {{ .Values.clamav.notifyOnClean | quote }}
  SCAN_DIR:  "/mnt/media"
  DB_PATH:   "/var/lib/clamav"
  MAX_FILE_SIZE: {{ .Values.clamav.maxFileSize | quote }}
  # Directories under the media share to skip: config backups, scan reports,
  # and the incomplete download dir (partial files). Colon-separated.
  EXCLUDE_DIRS: {{ printf "%s:%s:%s" .Values.backup.destination .Values.clamav.reportDir .Values.sabnzbd.downloads.incompleteDir | quote }}
  REPORT_DIR: {{ .Values.clamav.reportDir | quote }}
  KEEP_REPORTS: {{ .Values.clamav.keepReports | quote }}
  scan.sh: |
{{ .Files.Get "files/scripts/scan.sh" | indent 4 }}
  freshclam.sh: |
{{ .Files.Get "files/scripts/freshclam.sh" | indent 4 }}
{{- end }}

{{- if .Values.sabnzbd.config.seed }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: sabnzbd-seed — settings applied by an init container BEFORE
# SABnzbd starts. Editing a running SABnzbd does not work: it rewrites
# sabnzbd.ini from memory on shutdown and discards external changes.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: sabnzbd-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
data:
  SEED_ENABLED: "true"
  ENABLE_HTTPS: {{ if .Values.sabnzbd.config.enableHttps }}"1"{{ else }}"0"{{ end }}
  INET_EXPOSURE: {{ .Values.sabnzbd.config.inetExposure | quote }}
  DOWNLOAD_DIR: {{ if .Values.sabnzbd.downloads.enabled }}{{ .Values.sabnzbd.downloads.localDir | quote }}{{ else }}{{ .Values.sabnzbd.downloads.incompleteDir | quote }}{{ end }}
  COMPLETE_DIR: {{ .Values.sabnzbd.downloads.completeDir | quote }}
  HOST_WHITELIST: {{ concat (list "sabnzbd" (printf "sabnzbd.%s" .Release.Namespace) (printf "sabnzbd.%s.svc" .Release.Namespace) (printf "sabnzbd.%s.svc.cluster.local" .Release.Namespace)) .Values.sabnzbd.config.hostWhitelist | join "," | quote }}
  sab-seed.sh: |
{{ .Files.Get "files/scripts/sab-seed.sh" | indent 4 }}
{{- end }}

---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: plex-libraries — consumed by deploy.sh after each server is
# claimed, to create libraries over the Plex API (libraries live in Plex's
# database, so they cannot be seeded from a config file).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-libraries
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
data:
  libraries: |
{{- range .Values.plex.libraries }}
    {{ .name }}|{{ .type }}|{{ .path }}
{{- end }}

{{- if .Values.backup.enabled }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: backup-config — the config backup script
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
data:
  backup.py: |
{{ .Files.Get "files/scripts/backup.py" | indent 4 }}
{{- end }}
