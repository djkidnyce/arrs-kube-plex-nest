# ─────────────────────────────────────────────────────────────────────────────
# SECRETS — all credential Secrets for Arrs Kube Plex Nest
#
# These are TEMPLATE placeholders. The deploy.sh script creates the real
# secrets imperatively (kubectl create secret …) so plaintext values never
# appear in version-controlled YAML.
#
# If you apply this file directly, replace every REPLACE_ME value first.
# ─────────────────────────────────────────────────────────────────────────────

# SMB credentials for the TrueNAS share
apiVersion: v1
kind: Secret
metadata:
  name: smb-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: "REPLACE_ME"
  password: "REPLACE_ME"

---
# Plex claim token — obtain from https://plex.tv/claim (valid 4 minutes)
apiVersion: v1
kind: Secret
metadata:
  name: plex-claim
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: "REPLACE_ME"

---
# VPN credentials — two-line format: username on line 1, password on line 2
# Mount path: /vpn/auth/openvpn.cred  (0400)
apiVersion: v1
kind: Secret
metadata:
  name: vpn-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
type: Opaque
stringData:
  openvpn.cred: |
    REPLACE_WITH_PRIVADOVPN_USERNAME
    REPLACE_WITH_PRIVADOVPN_PASSWORD

---
# ClamAV webhook URL for scan-result notifications
# Format depends on notificationType in values.yaml:
#   ntfy:    https://ntfy.sh/YOUR_TOPIC
#   discord: https://discord.com/api/webhooks/...
#   slack:   https://hooks.slack.com/services/...
#   gotify:  https://your-gotify/message?token=...
#   generic: any POST endpoint
apiVersion: v1
kind: Secret
metadata:
  name: clamav-notify
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
type: Opaque
stringData:
  webhook-url: "REPLACE_ME"
