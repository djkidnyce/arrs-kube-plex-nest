# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicies — per-app segmentation
#
# Default: deny all ingress to every pod in the namespace. Each allowed flow
# is then whitelisted explicitly:
#   plex      ← anywhere            :32400  (LoadBalancer / clients / tautulli / seerr)
#   seerr     ← anywhere            :5055   (LoadBalancer / users)
#   sabnzbd   ← sonarr/radarr/lidarr:8080   (queue management)
#   *arrs     ← seerr               :8989/:7878/:8686 (request handoff)
#
# NOT reachable from other pods (by design):
#   gluetun control API :8000 — the rotator talks to it over localhost
#   tautulli / sabnzbd / *arr web UIs — use kubectl port-forward
#     (port-forward traffic enters via the kubelet and is not blocked by
#      NetworkPolicy on mainstream CNIs)
#
# Egress is unrestricted (gluetun's kill-switch already constrains SABnzbd).
# ─────────────────────────────────────────────────────────────────────────────

# 1. Default-deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# 2. Plex — external ingress on 32400 (also covers tautulli/seerr → plex)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: plex-external-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: plex
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: plex
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 32400

---
# 3. One ingress policy per exposed service. Without these, a NodePort or
#    LoadBalancer publishes the port but default-deny silently drops traffic.
{{- $ports := dict "sabnzbd" .Values.sabnzbd.port "sonarr" .Values.sonarr.port "radarr" .Values.radarr.port "lidarr" .Values.lidarr.port "tautulli" .Values.tautulli.port }}
{{- $ns := .Release.Namespace }}
{{- $labels := include "akpn.labels" . }}
{{- range $svc, $port := $ports }}
{{- if index $.Values.expose $svc }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $svc }}-external-ingress
  namespace: {{ $ns }}
  labels:
    app: {{ $svc }}
    {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ $svc }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ $port }}
---
{{- end }}
{{- end }}
# 4. Overseerr — external ingress on 5055
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seerr-external-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: seerr
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: seerr
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.seerr.port }}

---
# 5. SABnzbd — the *arrs may always reach the download API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sabnzbd-from-arrs
  namespace: {{ .Release.Namespace }}
  labels:
    app: sabnzbd
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: sabnzbd
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["sonarr", "radarr", "lidarr"]
      ports:
        - protocol: TCP
          port: {{ .Values.sabnzbd.port }}

---
# 6. *arrs — Overseerr may reach their APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arrs-from-seerr
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["sonarr", "radarr", "lidarr"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: seerr
      ports:
        - protocol: TCP
          port: {{ .Values.sonarr.port }}
        - protocol: TCP
          port: {{ .Values.radarr.port }}
        - protocol: TCP
          port: {{ .Values.lidarr.port }}
