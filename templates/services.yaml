# ─────────────────────────────────────────────────────────────────────────────
# Services — all non-Plex services
# (Plex services are in plex-services.yaml)
# ─────────────────────────────────────────────────────────────────────────────

# SABnzbd — download client API
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  namespace: {{ .Release.Namespace }}
  labels:
    app: sabnzbd
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  type: {{ include "akpn.serviceType" (dict "svc" "sabnzbd" "root" $) }}
  selector:
    app: sabnzbd
  ports:
    - name: http
      port: {{ .Values.sabnzbd.port }}
      targetPort: {{ .Values.sabnzbd.port }}
{{- if and .Values.expose.sabnzbd (eq .Values.expose.mode "nodePort") }}
      nodePort: {{ .Values.expose.nodePorts.sabnzbd }}
{{- end }}

