# ─────────────────────────────────────────────────────────────────────────────
# *arr Deployments — Sonarr, Radarr, Lidarr
# All mount the shared SMB media PVC + their own config PVC.
# ─────────────────────────────────────────────────────────────────────────────

# ── Sonarr ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: {{ .Release.Namespace }}
  labels:
    app: sonarr
    {{- include "akpn.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        fsGroup: 1000
      containers:
        - name: sonarr
          image: {{ .Values.sonarr.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.sonarr.port }}
          env:
            {{- include "akpn.globalEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.sonarr.resources | nindent 12 }}
          {{- include "akpn.httpProbes" (dict "port" .Values.sonarr.port "path" "/ping") | nindent 10 }}
          volumeMounts:
            {{- include "akpn.mediaVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "akpn.mediaVolumes" (dict "configClaim" "sonarr-config") | nindent 8 }}

